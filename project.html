document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

}

    return;

      <span class="breadcrumb-sep">·</span>
      <a href="portfolio.html#projects">Projects</a>
      <span class="breadcrumb-sep">·</span>
      <span class="breadcrumb-cur">${proj.title}</span>
    </div>

    <!-- MAIN + SIDEBAR -->
    <div class="proj-wrap" id="projWrap">

      <!-- LEFT -->
      <div class="proj-main">

        <!-- Overview -->
        <div class="section-label" id="sl-overview">
          <div class="section-label-line"></div>
          <span class="section-label-text">Overview</span>
        </div>
        <svg class="wave-div" viewBox="0 0 64 10" xmlns="http://www.w3.org/2000/svg"><path d="M0 5 Q8 1 16 5 Q24 9 32 5 Q40 1 48 5 Q56 9 64 5" stroke="#bfd8c6" stroke-width="1.4" fill="none"/></svg>
        <p class="proj-desc" id="projDesc">${proj.overview}</p>

        <!-- Gallery -->
        <div class="section-label" id="sl-gallery">
          <div class="section-label-line"></div>
          <span class="section-label-text">Gallery</span>
        </div>
        <div class="gallery ${galLayout}" id="gallery" style="margin-top:18px;">
          ${galItems}
        </div>

        <!-- Process -->
        <div class="section-label" id="sl-process" style="margin-top:44px;">
          <div class="section-label-line"></div>
          <span class="section-label-text">Process</span>
        </div>
        <div class="process" id="process" style="margin-top:18px;">
          ${steps}
        </div>

      </div>

      <!-- RIGHT SIDEBAR -->
      <div class="proj-sidebar" id="sidebar">

        <!-- Project Info -->
        <div class="info-card">
          <div class="info-card-head">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="12" height="12" rx="1.5" stroke-width="1.4"/><path d="M5 6h6M5 9h4" stroke-width="1.2" stroke-linecap="round"/></svg>
            <span class="info-card-head-txt">Project Info</span>
          </div>
          <div class="info-rows">
            <div class="info-row"><span class="info-row-label">Category</span><span class="info-row-val">${proj.category}</span></div>
            <div class="info-row"><span class="info-row-label">Year</span><span class="info-row-val">${proj.year}</span></div>
            <div class="info-row"><span class="info-row-label">Duration</span><span class="info-row-val">${proj.duration}</span></div>
            <div class="info-row"><span class="info-row-label">Role</span><span class="info-row-val">${proj.role}</span></div>
          </div>
        </div>

        <!-- Tools Used -->
        <div class="info-card">
          <div class="info-card-head">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M3 13l3-3 6-6-2-2-6 6-3 3 2 2zM10 4l2 2" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="info-card-head-txt">Tools Used</span>
          </div>
          <div class="tag-cloud">${proj.tools.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>

        <!-- Tags -->
        <div class="info-card">
          <div class="info-card-head">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M2 2h5l7 7-5 5-7-7V2z" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5" cy="5" r="1" fill="currentColor" stroke="none"/></svg>
            <span class="info-card-head-txt">Keywords</span>
          </div>
          <div class="tag-cloud">${tags}</div>
        </div>

        <!-- Back button -->
        <a href="portfolio.html#projects" class="back-btn" id="backBtnSide">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M16 10H4M9 5L4 10l5 5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          All Projects · 全部作品
        </a>

      </div>
    </div>

    <!-- PREV / NEXT -->
    <div class="proj-nav" id="projNav">
      ${prevHTML}
      ${nextHTML}
    </div>
  `;

  // ─── ANIMATIONS ───
  // Cursor hover targets
  cursorHover(document.querySelectorAll('a,button,.tag,.proj-nav-btn,.gal-item,.back-btn'));

  // Page fade in
  gsap.to('body', { opacity:1, duration:.55, ease:'power2.out' });

  // Banner
  gsap.from('#bannerContent > *', { opacity:0, y:30, stagger:.14, duration:.9, ease:'power3.out', delay:.2 });
  gsap.from('.banner-cloud', { opacity:0, x:-20, stagger:.18, duration:1.2, ease:'power2.out', delay:.3 });
  gsap.from('.banner-icon-wrap', { opacity:0, scale:.7, duration:1.4, ease:'back.out(2)', delay:.4 });

  // Breadcrumb + content
  gsap.from('#bc', { opacity:0, y:-10, duration:.5, ease:'power2.out', delay:.5 });
  gsap.from('#sl-overview, #projDesc', { opacity:0, y:24, stagger:.1, duration:.7, ease:'power3.out',
    scrollTrigger:{ trigger:'#sl-overview', start:'top 86%' }
  });
  gsap.from('#sl-gallery', { opacity:0, y:16, duration:.6, ease:'power3.out',
    scrollTrigger:{ trigger:'#sl-gallery', start:'top 88%' }
  });
  gsap.from('.gal-item', { opacity:0, y:32, scale:.97, stagger:.12, duration:.65, ease:'back.out(1.4)',
    scrollTrigger:{ trigger:'#gallery', start:'top 84%' }
  });
  gsap.from('#sl-process', { opacity:0, y:16, duration:.6, ease:'power3.out',
    scrollTrigger:{ trigger:'#sl-process', start:'top 88%' }
  });
  gsap.from('.process-step', { opacity:0, x:-24, stagger:.14, duration:.65, ease:'power3.out',
    scrollTrigger:{ trigger:'#process', start:'top 84%' }
  });
  gsap.from('#sidebar > *', { opacity:0, x:32, stagger:.12, duration:.7, ease:'power3.out',
    clearProps:'transform',
    scrollTrigger:{ trigger:'#projWrap', start:'top 78%' }
  });
  gsap.from('#projNav > *', { opacity:0, y:24, stagger:.14, duration:.65, ease:'power3.out',
    scrollTrigger:{ trigger:'#projNav', start:'top 90%' }
  });

  // Prev/next page fade
  document.querySelectorAll('[data-nav]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const href = a.getAttribute('href');
      gsap.to('body', { opacity:0, duration:.32, ease:'power2.in', onComplete:() => { window.location.href = href; } });
    });
  });

  // Back buttons
  [document.getElementById('backBtn'), document.getElementById('backBtnSide')].forEach(btn => {
    if(!btn) return;
    btn.addEventListener('click', e => {
      e.preventDefault();
      gsap.to('body', { opacity:0, duration:.32, ease:'power2.in', onComplete:() => { window.location.href = btn.getAttribute('href'); } });
    });
  });

  window.addEventListener('load', () => ScrollTrigger.refresh());

}

render();

// ─── LIGHTBOX ───
function closeLightbox() {
  gsap.to('#lightbox', { opacity:0, duration:.25, ease:'power2.in', onComplete:() => {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('lb-img').src = '';
  }});
}
 
document.addEventListener('DOMContentLoaded', () => {
  // Open on image click
  document.querySelectorAll('.gal-item img').forEach(img => {
    img.closest('.gal-item').addEventListener('click', () => {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');
      lbImg.src = img.src;
      lb.style.display = 'flex';
      requestAnimationFrame(() => {
        gsap.fromTo(lb, { opacity:0 }, { opacity:1, duration:.3, ease:'power2.out' });
        gsap.fromTo('#lb-img', { scale:.88, opacity:0 }, { scale:1, opacity:1, duration:.38, ease:'back.out(1.6)' });
      });
    });
  });
 
  // Close button
  document.getElementById('lb-close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeLightbox();
  });
 
  // Click backdrop to close
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });
 
  // Escape key to close
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
});

</script>

  <!-- ─── LIGHTBOX ─── -->
<div id="lightbox" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(20,40,30,0.92); backdrop-filter:blur(8px); align-items:center; justify-content:center; padding:24px;">
  <button id="lb-close" style="position:fixed; top:24px; right:32px; background:none; border:1px solid rgba(191,216,198,0.5); color:#bfd8c6; font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3em; padding:8px 18px; cursor:pointer; transition:all .25s; z-index:1002;">✕ &nbsp;CLOSE</button>
  <img id="lb-img" src="" alt="" style="max-width:90vw; max-height:88vh; object-fit:contain; display:block; box-shadow:0 24px 80px rgba(0,0,0,0.5);">
</div>


</body>
</html>
